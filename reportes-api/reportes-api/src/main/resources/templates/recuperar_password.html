<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Reportes Urbanos</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

    <div id="loader" class="loader-overlay">
        <div class="loader"></div>
    </div>

    <div class="page-wrapper">

        <div class="left-panel">
            <div class="icon"><img src="/images/login.png" alt=""></div>
            <h2>Recuperar Contraseña</h2>
            <p>Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.</p>
            <a th:href="@{/login}" class="btn-outline">Volver al login</a>
        </div>

        <div class="right-panel">
            <h2>¿Olvidaste tu contraseña?</h2>
            <p class="subtitle">Te enviaremos un enlace a tu correo</p>

            <div th:if="${mensaje}" class="success-message">
                <span th:text="${mensaje}"></span>
            </div>

            <form th:action="@{/recuperar-password}" method="post">
                <div class="input-group">
                    <img th:src="@{/images/icono-email.png}" alt="Email" class="icon">
                    <input type="email" name="email" placeholder="Correo electrónico" required>
                </div>
                <button type="submit" class="btn">Enviar enlace</button>
            </form>
        </div>

    </div>

    <script th:src="@{/js/script.js}"></script>
</body>
</html>
