<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lamentamos que persista</title>
    <link rel="stylesheet" th:href="@{/css/confirmacion.css}">
</head>
<body>
    <div class="card">
        <div class="header header-no">
            <div class="icon-circle">
                <svg width="38" height="38" viewBox="0 0 24 24" fill="none"
                     stroke="white" stroke-width="2.5" stroke-linecap="round"
                     stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="15" y1="9" x2="9" y2="15"/>
                    <line x1="9" y1="9" x2="15" y2="15"/>
                </svg>
            </div>
            <h1>Lamentamos que persista</h1>
        </div>
        <div class="body">
            <div class="badge badge-no">❌ Problema persiste</div>
            <p>
                Entendemos tu frustración. Inicia sesión y deja un comentario
                en tu reporte explicando qué sigue fallando — el equipo lo revisará.
            </p>
            <a href="/usuario/inicio" class="btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                     stroke="white" stroke-width="2.5" stroke-linecap="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                </svg>
                Comentar mi reporte
            </a>
        </div>
        <div class="footer">Sistema de Reportes Urbanos — Cartagena de Indias</div>
    </div>
</body>
</html>
