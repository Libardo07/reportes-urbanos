<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div class="card" th:fragment="explorar-reportes">

    <div class="content-header">
        <h1>Explorar reportes</h1>
        <p class="exp-subtitle">
            <span th:text="${total}">0</span> reporte(s) encontrado(s)
        </p>
    </div>

    <!-- Buscador -->

    <div class="exp-search-wrap">
        <input type="text" id="exp-search" class="exp-search-input"
            placeholder="Buscar reporte por título... "
            th:value="${q}" autocomplete="off">
        <button class="exp-search-btn-icon" id="exp-search-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
        </button>
        <button class="exp-search-clear" id="exp-clear"
                th:style="${q != null and !q.isBlank()} ? 'display:flex' : 'display:none'"
                onclick="limpiarBusqueda()">✕</button>
    </div>

    <!-- Filtro activo -->
    <div class="exp-filtro-activo" id="exp-filtro"
         th:if="${q != null and !q.isBlank()}">
        Resultados para: <strong th:text="${q}"></strong>
    </div>

    <!-- Lista de reportes -->
    <div class="exp-lista" id="exp-lista">
        <div th:each="r : ${reportes}" class="exp-card"
             th:attr="data-titulo=${r.titulo}">

            <!-- Foto miniatura -->
            <div class="exp-card-foto">
                <img th:if="${r.imagenes != null and !r.imagenes.isEmpty()}"
                     th:src="${r.imagenes[0]}"
                     alt="Foto" class="exp-foto-img" loading="lazy">
                <div th:unless="${r.imagenes != null and !r.imagenes.isEmpty()}"
                     class="exp-foto-placeholder">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                         stroke="#c5d8f8" stroke-width="1.5" stroke-linecap="round">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                </div>
                <!-- Badge estado -->
                <span class="exp-estado-badge"
                    th:classappend="'exp-badge-' + ${#strings.toLowerCase(#strings.replace(estadosMap[r.estadoReporteId], '_', ''))}"
                    th:text="${#strings.replace(estadosMap[r.estadoReporteId], '_', ' ')}"></span>
            </div>

            <!-- Info -->
            <div class="exp-card-info">
                <div class="exp-card-top">
                    <h3 class="exp-card-titulo" th:text="${r.titulo}"></h3>
                    <span class="exp-card-tipo"
                        th:text="${#strings.replace(tiposMap[r.tipoReporteId], '_', ' ')}"></span>
                </div>

                <div class="exp-card-meta">
                    <span class="exp-meta-item">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/>
                            <circle cx="12" cy="10" r="3"/>
                        </svg>
                        <span th:text="${barriosMap[r.barrioId]}"></span>
                    </span>
                    <span class="exp-meta-item">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <span th:text="${r.usuario.nombre}"></span>
                    </span>
                    <span class="exp-meta-item">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <circle cx="12" cy="12" r="10"/>
                            <polyline points="12 6 12 12 16 14"/>
                        </svg>
                        <span th:text="${#temporals.format(r.fechaModificacion, 'dd/MM/yyyy')}"></span>
                    </span>
                </div>

                <!-- Footer de la card -->
                <div class="exp-card-footer">
                    <span class="exp-comentarios-count">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                        </svg>
                        <span th:text="${contadores[r.id] ?: 0}">0</span> comentarios
                    </span>
                    <button class="exp-btn-ver"
                            th:attr="data-id=${r.id}"
                            onclick="verDetalleReporte(this.getAttribute('data-id'))">
                        Ver y comentar
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <polyline points="9 18 15 12 9 6"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Sin resultados -->
        <div class="exp-sin-resultados" id="exp-sin-resultados"
             th:if="${#lists.isEmpty(reportes)}" style="display:flex;">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
                 stroke="#c5d8f8" stroke-width="1.5" stroke-linecap="round">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <p>No se encontraron reportes.</p>
        </div>
    </div>

    <!-- Ver más -->
    <div class="exp-ver-mas-wrap" th:if="${hayMas}">
        <button class="exp-btn-ver-mas"
                th:attr="data-page=${nextPage}, data-q=${q}"
                onclick="verMasReportes(this)">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <polyline points="6 9 12 15 18 9"/>
            </svg>
            Ver más reportes
        </button>
    </div>

</div>
</html>
