<div class="card" th:fragment="lista-reportes">
    <div class="content-header" style="display:flex; justify-content:space-between; align-items:center;">
        <h1>Lista de Reportes</h1>
        <button class="filtro-btn" onclick="toggleFiltroPanel()">
            <img src="/images/filtro.png" alt="Filtrar" style="width:18px;height:18px;filter:brightness(0) invert(1);margin-right:6px;">
            Filtrar
        </button>
    </div>

    <!-- Panel de filtros -->
    <div class="filtro-panel" id="filtroPanel">
        <div class="filtro-panel-header">
            <span class="filtro-panel-titulo">Filtros</span>
            <button class="filtro-cerrar" onclick="toggleFiltroPanel()">✕</button>
        </div>

        <!-- Estado -->
        <div class="filtro-grupo">
            <label class="filtro-label">Estado</label>
            <div class="custom-select">
                <select class="form-control" id="filtroEstadoSelect">
                    <option value="">Todos los estados</option>
                    <option value="1">Pendiente</option>
                    <option value="2">En Progreso</option>
                    <option value="3">Resuelto</option>
                </select>
            </div>
        </div>

        <!-- Tipo -->
        <div class="filtro-grupo">
            <label class="filtro-label">Tipo</label>
            <div class="custom-select">
                <select class="form-control" id="filtroTipoSelect">
                    <option value="">Todos los tipos</option>
                    <option value="1">Infraestructura</option>
                    <option value="2">Servicios Publicos</option>
                </select>
            </div>
        </div>

        <!-- Barrio -->
        <div class="filtro-grupo">
            <label class="filtro-label">Barrio</label>
            <input type="hidden" id="filtroBarrioId">
            <div class="custom-select-wrapper">
                <div class="custom-select-display" id="filtroBarrioDisplay">
                    Seleccione un barrio
                </div>
                <div class="custom-select-dropdown" id="filtroBarrioDropdown" style="display:none;">
                    <input type="text" id="filtroBarrioFiltro" placeholder="Buscar barrio..." autocomplete="off">
                    <ul id="filtroBarrioLista"></ul>
                </div>
            </div>
        </div>

        <!-- Fecha -->
        <div class="filtro-grupo">
            <label class="filtro-label">Desde</label>
            <div style="display:flex;gap:8px;">
                <input type="date" class="filtro-input" id="filtroFechaDesde" style="flex:1;">
                <input type="time" class="filtro-input" id="filtroHoraDesde" style="width:110px;">
            </div>
        </div>

        <div class="filtro-grupo">
            <label class="filtro-label">Hasta</label>
            <div style="display:flex;gap:8px;">
                <input type="date" class="filtro-input" id="filtroFechaHasta" style="flex:1;">
                <input type="time" class="filtro-input" id="filtroHoraHasta" style="width:110px;">
            </div>
        </div>

        <div class="filtro-acciones">
            <button class="filtro-btn-limpiar" onclick="limpiarFiltros()">Limpiar</button>
            <button class="filtro-btn-aplicar" onclick="aplicarFiltros()">Aplicar</button>
        </div>
    </div>

    <div class="tabla-wrapper">
        <table class="table">
            <thead>
                <tr>
                    <th>Usuario</th>
                    <th>Titulo</th>
                    <th>Tipo</th>
                    <th>Fecha</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="r : ${reportes}">
                    <td th:text="${r.usuario.nombre}"></td>
                    <td th:text="${r.titulo}"></td>
                    <td th:text="${#strings.replace(tiposMap[r.tipoReporteId], '_', ' ')}"></td>
                    <td th:text="${r.fechaModificacion != null ? #temporals.format(r.fechaModificacion, 'dd/MM/yyyy HH:mm') : 'Sin modificar'}"></td>
                    <td>
                        <span class="badge"
                            th:classappend="'badge-' + ${#strings.toLowerCase(#strings.replace(estadosMap[r.estadoReporteId], '_', ''))}"
                            th:text="${#strings.replace(estadosMap[r.estadoReporteId], '_', ' ')}">
                        </span>
                    </td>
                    <td class="actions">
                        <button class="ver-detalles-btn action-btn"
                                th:attr="data-modal-id='modal-' + ${r.id}">
                            Ver
                        </button>
                        <div class="custom-select">
                            <select class="estado-select form-control"
                                    th:attr="data-id=${r.id}"
                                    th:disabled="${estadosMap[r.estadoReporteId] == 'Resuelto'}">
                                <option value="" selected disabled>Estado</option>
                                <option th:value="'EN_PROGRESO'" th:selected="${estadosMap[r.estadoReporteId] == 'En_Progreso'}">En Progreso</option>
                                <option th:value="'RESUELTO'" th:selected="${estadosMap[r.estadoReporteId] == 'Resuelto'}">Resuelto</option>
                            </select>
                        </div>
                        <button class="action-btn delete-reporte"
                                th:attr="data-id=${r.id},
                                        data-url=@{'/admin/eliminar-reporte/' + ${r.id}},
                                        data-reload-view='/admin/fragmento/lista-reportes'"
                                title="Eliminar">
                            <img th:src="@{/images/icono-trash.png}" alt="Eliminar" loading="lazy">
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Modales con imágenes -->
    <div th:each="r : ${reportes}">
        <div th:id="'modal-' + ${r.id}"
             class="modal-overlay"
             th:attr="data-modal-id='modal-' + ${r.id}">
            <div class="modal-contenido">
                <div class="modal-top">
                    <div class="modal-title-block">
                        <h2 th:text="${r.titulo}"></h2>
                    </div>
                    <button class="cerrar-modal" th:attr="data-modal-id='modal-' + ${r.id}">✕</button>
                </div>
                <div class="modal-body">
                    <div class="modal-grid">
                        <div class="modal-field">
                            <span class="modal-label">Usuario</span>
                            <span class="modal-value" th:text="${r.usuario.nombre}"></span>
                        </div>
                        <div class="modal-field">
                            <span class="modal-label">Fecha</span>
                            <span class="modal-value" th:text="${r.fechaModificacion != null ? #temporals.format(r.fechaModificacion, 'dd/MM/yyyy HH:mm') : 'Sin modificar'}"></span>
                        </div>
                        <div class="modal-field">
                            <span class="modal-label">Barrio</span>
                            <span class="modal-value" th:text="${barriosMap[r.barrioId]}"></span>
                        </div>
                        <div class="modal-field">
                            <span class="modal-label">Admin asignado</span>
                            <span class="modal-value" th:text="${r.usuarioAdmin != null ? r.usuarioAdmin.nombre : 'No asignado'}"></span>
                        </div>
                        <div class="modal-field modal-field-full">
                            <span class="modal-label">Dirección</span>
                            <span class="modal-value" th:text="${r.direccion}"></span>
                        </div>
                        <div class="modal-field modal-field-full">
                            <span class="modal-label">Descripción</span>
                            <span class="modal-value" th:text="${r.descripcion}"></span>
                        </div>

                        <!-- Imágenes -->
                        <div class="modal-field modal-field-full"
                             th:if="${r.imagenes != null and !r.imagenes.isEmpty()}">
                            <span class="modal-label">Fotos del problema</span>
                            <div class="modal-imagenes">
                                <a th:each="img : ${r.imagenes}"
                                   th:href="${img}"
                                   target="_blank"
                                   class="modal-imagen-link">
                                    <img th:src="${img}"
                                         alt="Foto del reporte"
                                         class="modal-imagen"
                                         loading="lazy">
                                </a>
                            </div>
                        </div>
                        <div class="modal-field modal-field-full"
                             th:if="${r.imagenes == null or r.imagenes.isEmpty()}">
                            <span class="modal-label">Fotos del problema</span>
                            <span class="modal-value" style="color:#9e9e9e;font-style:italic;">
                                Sin fotos adjuntas
                            </span>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
