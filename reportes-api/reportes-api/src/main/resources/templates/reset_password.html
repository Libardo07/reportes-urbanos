<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña — Reportes Urbanos</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <link rel="stylesheet" th:href="@{/css/verificacion.css}">
</head>
<body>

<div id="loader" class="loader-overlay">
    <div class="loader"></div>
</div>

<div class="page-wrapper">

    <!-- Panel izquierdo -->
    <div class="left-panel">
        <div class="icon">
            <div class="ve-left-icon">
                <!-- Ícono candado -->
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
                     stroke="white" stroke-width="1.5" stroke-linecap="round"
                     stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </div>
        </div>
        <h2>Nueva Contraseña</h2>
        <p>Crea una contraseña segura de al menos 6 caracteres para proteger tu cuenta.</p>
        <a th:href="@{/login}" class="btn-outline">Volver al login</a>
    </div>

    <!-- Panel derecho -->
    <div class="right-panel">

        <!-- Cabecera -->
        <div class="ve-header">
            <div class="ve-header-icon">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none"
                     stroke="#1a73e8" stroke-width="1.8" stroke-linecap="round"
                     stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </div>
            <h2>Restablecer contraseña</h2>
            <p>Ingresa y confirma tu nueva contraseña</p>
        </div>

        <!-- Error -->
        <div th:if="${error}" class="ve-alerta ve-alerta--error" th:text="${error}"></div>

        <!-- Formulario -->
        <form th:action="@{/recuperar-password/reset}" method="post" id="resetForm">
            <input type="hidden" name="token" th:value="${token}">

            <div class="input-group">
                <img th:src="@{/images/icono-password.png}" alt="" class="icon" loading="lazy">
                <input type="password" id="nuevaPassword" name="nuevaPassword"
                       placeholder="Nueva contraseña" required autocomplete="new-password">
                <img th:src="@{/images/icono-ojo-visible.png}" alt="Mostrar"
                     class="password-toggle" loading="lazy">
            </div>

            <div class="input-group">
                <img th:src="@{/images/icono-password.png}" alt="" class="icon" loading="lazy">
                <input type="password" id="confirmarPassword" name="confirmarPassword"
                       placeholder="Confirmar contraseña" required autocomplete="new-password">
                <img th:src="@{/images/icono-ojo-visible.png}" alt="Mostrar"
                     class="password-toggle" loading="lazy">
            </div>

            <button type="submit" class="btn">
                Restablecer contraseña
            </button>
        </form>

        <!-- Nota de seguridad -->
        <div class="ve-security-note" style="margin-top:20px;">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                 stroke="#5c6bc0" stroke-width="2" stroke-linecap="round"
                 stroke-linejoin="round" style="flex-shrink:0;margin-top:1px;">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            <span>Usa al menos <strong>6 caracteres</strong>. Combina letras,
                  números y símbolos para mayor seguridad.</span>
        </div>

    </div>
</div>

<script th:src="@{/js/script.js}"></script>
<script th:src="@{/js/reset_password.js}"></script>
</body>
</html>
