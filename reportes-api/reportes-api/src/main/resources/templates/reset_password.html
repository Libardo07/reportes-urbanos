<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña - Reportes Urbanos</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

    <div id="loader" class="loader-overlay">
        <div class="loader"></div>
    </div>

    <div class="page-wrapper">

        <div class="left-panel">
            <div class="icon"><img src="/images/login.png" alt="" loading="lazy"></div>
            <h2>Nueva Contraseña</h2>
            <p>Crea una nueva contraseña segura para tu cuenta.</p>
            <a th:href="@{/login}" class="btn-outline">Volver al login</a>
        </div>

        <div class="right-panel">
            <h2>Restablecer contraseña</h2>
            <p class="subtitle">Ingresa tu nueva contraseña</p>

            <div th:if="${error}" class="error-message">
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/recuperar-password/reset}" method="post">
                <input type="hidden" name="token" th:value="${token}">
                <div class="input-group">
                    <img th:src="@{/images/icono-password.png}" alt="Contraseña" class="icon" loading="lazy">
                    <input type="password" id="nuevaPassword" name="nuevaPassword" placeholder="Nueva contraseña" required>
                    <img th:src="@{/images/icono-ojo-visible.png}" alt="Mostrar contraseña" class="password-toggle" loading="lazy">
                </div>
                <div class="input-group">
                    <img th:src="@{/images/icono-password.png}" alt="Confirmar" class="icon" loading="lazy">
                    <input type="password" id="confirmarPassword" name="confirmarPassword" placeholder="Confirmar contraseña" required>
                    <img th:src="@{/images/icono-ojo-visible.png}" alt="Mostrar contraseña" class="password-toggle" loading="lazy">
                </div>
                <button type="submit" class="btn">Restablecer contraseña</button>
            </form>
        </div>

    </div>

    <script th:src="@{/js/script.js}"></script>
</body>
</html>
