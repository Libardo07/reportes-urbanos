<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel del Ciudadano</title>
    <link rel="stylesheet" th:href="@{/css/panel.css}">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="dashboard-container usuario">

    <div id="loader" class="loader-overlay">
        <div class="loader"></div>
    </div>

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="welcome-title-animated">
                <div class="text"><span>BIENVENIDO</span></div>
                <div class="text"><span>BIENVENIDO</span></div>
                <div class="text"><span>BIENVENIDO</span></div>
                <div class="text"><span>BIENVENIDO</span></div>
                <div class="text"><span>BIENVENIDO</span></div>
                <div class="text"><span>BIENVENIDO</span></div>
                <div class="text"><span>BIENVENIDO</span></div>
                <div class="text"><span>BIENVENIDO</span></div>
                <div class="text"><span>BIENVENIDO</span></div>
                <div class="text"><span>BIENVENIDO</span></div>
            </div>
            <div class="usuario-info">
                <img th:src="@{/images/icono-login.png}" alt="Usuario" loading="lazy">
                <div class="details">
                    <div class="nombre" th:text="${usuario.nombre}">Juan Pérez</div>
                    <div class="rol" th:text="${usuario.rol}">Ciudadano</div>
                </div>
            </div>
        </div>
        <nav class="sidebar-menu">
            <div class="menu-item menu-item-animated active" th:attr="data-view='/usuario/fragmento/formulario-reporte'">
                <img th:src="@{/images/icono-plus.png}" alt="Crear" loading="lazy">
                <span>Crear reporte</span>
            </div>
            <div class="menu-item menu-item-animated" th:attr="data-view='/usuario/fragmento/lista-reportes'">
                <img th:src="@{/images/icono-list.png}" alt="Ver" loading="lazy">
                <span>Ver reportes</span>
            </div>
        </nav>
        <div class="sidebar-footer">
            <button class="logout-btn-animated" onclick="logout()">
                <div class="sign">
                    <img th:src="@{/images/icono-logout.png}" alt="Salir" loading="lazy">
                </div>
            <div class="text">Salir</div>
            </button>
        </div>
    </aside>

    <main class="content" id="content-area">
        <div th:replace="~{usuario/fragments/formulario-reporte :: formulario-reporte}"></div>
    </main>

    <script th:src="@{/js/formulario-reporte.js}"></script>
    <script th:src="@{/js/script.js}"></script>
</body>
</html>
