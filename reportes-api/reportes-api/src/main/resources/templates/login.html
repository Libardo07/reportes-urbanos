<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Reportes Urbanos</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

    <div id="loader" class="loader-overlay">
        <div class="loader"></div>
    </div>

    <div class="page-wrapper">

        <div class="left-panel">
            <div class="icon"><img src="/images/login.png" alt="" loading="lazy"></div>
            <h2>Reportes Urbanos</h2>
            <p>Plataforma ciudadana para reportar problemas de infraestructura y servicios públicos en Cartagena de Indias.</p>
            <a th:href="@{/registro}" class="btn-outline">Crear cuenta</a>
        </div>

        <div class="right-panel">
            <h2>Bienvenido</h2>
            <p class="subtitle">Ingresa a tu cuenta para continuar</p>

            <div th:if="${error}" class="error-message">
                <span th:text="${error}"></span>
            </div>

            <div th:if="${param.registroExitoso}" class="success-message">
                ¡Registro exitoso! Ahora puedes iniciar sesión.
            </div>

            <form th:action="@{/login}" method="post" id="loginForm">
                <div class="input-group">
                    <img th:src="@{/images/icono-email.png}" alt="Email" class="icon" loading="lazy">
                    <input type="email" name="username" placeholder="Correo electrónico" required>
                </div>
                <div class="input-group">
                    <img th:src="@{/images/icono-password.png}" alt="Contraseña" class="icon" loading="lazy">
                    <input type="password" id="password" name="password" placeholder="Contraseña" required>
                    <img th:src="@{/images/icono-ojo-visible.png}" alt="Mostrar contraseña" class="password-toggle" loading="lazy">
                </div>
                <button type="submit" class="btn">Iniciar sesión</button>
            </form>

            <div class="separator"><span>o</span></div>

            <a href="/oauth2/authorization/google" class="btn-google">
                <svg width="20" height="20" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                </svg>
                Continuar con Google
            </a>

            <div class="forgot-password">
                <a th:href="@{/recuperar-password}">¿Olvidaste tu contraseña?</a>
            </div>
        </div>

    </div>

    <script th:src="@{/js/script.js}"></script>
</body>
</html>
