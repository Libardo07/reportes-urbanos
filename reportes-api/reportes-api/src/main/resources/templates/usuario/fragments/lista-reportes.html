<div class="card" th:fragment="lista-reportes">
    <div class="content-header">
        <h1>Mis Reportes</h1>
    </div>
    <table class="table">
        <thead>
            <tr>
                <th>Título</th>
                <th>Tipo</th>
                <th>Estado</th>
                <th>Fecha</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="r : ${reportes}">
                <td th:text="${r.titulo}"></td>
                <td th:text="${#strings.replace(tiposMap[r.tipoReporteId], '_', ' ')}"></td>
                <td><span class="badge"
                        th:classappend="'badge-' + ${#strings.toLowerCase(#strings.replace(estadosMap[r.estadoReporteId], '_', ''))}"
                        th:text="${#strings.replace(estadosMap[r.estadoReporteId], '_', ' ')}"></span></td>
                <td th:text="${r.fechaModificacion != null ? #temporals.format(r.fechaModificacion, 'dd/MM/yyyy HH:mm') : 'Sin modificar'}"></td>
                <td class="actions">
                    <button class="action-btn ver-detalles-btn"
                            th:attr="data-modal-id='modal-u-' + ${r.id}"
                            title="Ver detalles">
                        Ver
                    </button>

                    <span th:if="${estadosMap[r.estadoReporteId] == 'Pendiente'}">
                        <button class="action-btn edit-reporte"
                                th:attr="data-id=${r.id}, data-url=@{'/usuario/editar-reporte/' + ${r.id}}"
                                title="Editar">
                            <img th:src="@{/images/icono-edit.png}" alt="Editar" loading="lazy">
                        </button>
                        <button class="action-btn delete-reporte"
                                th:attr="data-id=${r.id},
                                        data-url=@{'/usuario/eliminar-reporte/' + ${r.id}},
                                        data-reload-view='/usuario/fragmento/lista-reportes'"
                                title="Eliminar">
                            <img th:src="@{/images/icono-trash.png}" alt="Eliminar">
                        </button>
                    </span>
                    <span th:unless="${estadosMap[r.estadoReporteId] == 'Pendiente'}" title="No editable">
                        <button class="action-btn" disabled><img th:src="@{/images/icono-edit.png}" alt="No editable" style="opacity:.4;" loading="lazy"></button>
                        <button class="action-btn" disabled><img th:src="@{/images/icono-trash.png}" alt="No eliminable" style="opacity:.4;" loading="lazy"></button>
                    </span>
                </td>
            </tr>
        </tbody>
    </table>

    <!-- Ver más -->
    <div class="exp-ver-mas-wrap" th:if="${hayMas}">
        <button class="exp-btn-ver-mas"
                th:attr="data-page=${nextPage}"
                onclick="verMasUsuario(this)">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <polyline points="6 9 12 15 18 9"/>
            </svg>
            Ver más reportes
        </button>
    </div>

    <!-- Modales con imágenes -->
    <div th:each="r : ${reportes}">
        <div th:id="'modal-u-' + ${r.id}"
             class="modal-overlay"
             th:attr="data-modal-id='modal-u-' + ${r.id}">
            <div class="modal-contenido">
                <div class="modal-top">
                    <div class="modal-title-block">
                        <h2 th:text="${r.titulo}"></h2>
                    </div>
                    <button class="cerrar-modal" th:attr="data-modal-id='modal-u-' + ${r.id}">✕</button>
                </div>
                <div class="modal-body">
                    <div class="modal-grid">
                        <div class="modal-field">
                            <span class="modal-label">Estado</span>
                            <span class="badge"
                                  th:classappend="'badge-' + ${#strings.toLowerCase(#strings.replace(estadosMap[r.estadoReporteId], '_', ''))}"
                                  th:text="${#strings.replace(estadosMap[r.estadoReporteId], '_', ' ')}"></span>
                        </div>
                        <div class="modal-field">
                            <span class="modal-label">Tipo</span>
                            <span class="modal-value" th:text="${#strings.replace(tiposMap[r.tipoReporteId], '_', ' ')}"></span>
                        </div>
                        <div class="modal-field">
                            <span class="modal-label">Barrio</span>
                            <span class="modal-value" th:text="${barriosMap[r.barrioId]}"></span>
                        </div>
                        <div class="modal-field">
                            <span class="modal-label">Fecha</span>
                            <span class="modal-value" th:text="${r.fechaModificacion != null ? #temporals.format(r.fechaModificacion, 'dd/MM/yyyy HH:mm') : 'Sin modificar'}"></span>
                        </div>
                        <div class="modal-field modal-field-full">
                            <span class="modal-label">Dirección</span>
                            <span class="modal-value" th:text="${r.direccion}"></span>
                        </div>
                        <div class="modal-field modal-field-full">
                            <span class="modal-label">Descripción</span>
                            <span class="modal-value" th:text="${r.descripcion}"></span>
                        </div>

                        <!-- Imágenes -->
                        <div class="modal-field modal-field-full"
                             th:if="${r.imagenes != null and !r.imagenes.isEmpty()}">
                            <span class="modal-label">Fotos del problema</span>
                            <div class="modal-imagenes">
                                <a th:each="img : ${r.imagenes}"
                                   th:href="${img}"
                                   target="_blank"
                                   class="modal-imagen-link">
                                    <img th:src="${img}"
                                         alt="Foto del reporte"
                                         class="modal-imagen"
                                         loading="lazy">
                                </a>
                            </div>
                        </div>
                        <div class="modal-field modal-field-full"
                             th:if="${r.imagenes == null or r.imagenes.isEmpty()}">
                            <span class="modal-label">Fotos del problema</span>
                            <span class="modal-value" style="color:#9e9e9e;font-style:italic;">
                                Sin fotos adjuntas
                            </span>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
