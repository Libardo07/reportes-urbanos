spring.application.name=reportes-api

spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.auto-index-creation=true
spring.data.mongodb.database=reportes_urbanos
spring.data.mongodb.option.connections-per-host=10
spring.data.mongodb.option.min-connections-per-host=2
spring.data.mongodb.option.connect-timeout=5000
spring.data.mongodb.option.socket-timeout=5000
spring.data.mongodb.option.max-wait-time=5000

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

admin.email=${ADMIN_EMAIL}
admin.password=${ADMIN_PASSWORD}
admin.nombre=${ADMIN_NOMBRE}


spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.data.redis.url=${REDIS_URL}
spring.cache.type=redis
spring.cache.redis.time-to-live=300000

server.compression.enabled=true
server.compression.mime-types=text/html,text/css,application/javascript,application/json
server.compression.min-response-size=1024

server.port=${PORT:9093}






